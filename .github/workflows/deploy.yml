name: Build & Deploy front-blog

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install -g npm@10.8.2
          npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Copy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/,nginx.conf"
          target: "~/front-blog-dist"
          rm: true

      - name: Build image and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # 用已构建好的 dist 替换服务器上的目录
            mkdir -p ~/front-blog
            cp -r ~/front-blog-dist/dist ~/front-blog/dist
            cp ~/front-blog-dist/nginx.conf ~/front-blog/nginx.conf
            # 写一个简单 Dockerfile，只需 nginx + 静态文件
            cat > ~/front-blog/Dockerfile << 'EOF'
            FROM nginx:1.25-alpine
            COPY dist /usr/share/nginx/html
            COPY nginx.conf /etc/nginx/conf.d/default.conf
            EXPOSE 80
            CMD ["nginx", "-g", "daemon off;"]
            EOF
            cd ~/front-blog
            docker build -t front-blog:latest .
            cd ~/blog
            docker compose up -d front-blog
            docker image prune -f
