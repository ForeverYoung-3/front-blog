name: Build & Deploy front-blog

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            # 拉取最新代码
            if [ ! -d ~/front-blog ]; then
              git clone https://github.com/ForeverYoung-3/front-blog.git ~/front-blog
            else
              cd ~/front-blog && git pull
            fi
            cd ~/front-blog
            # 在服务器本地构建镜像
            docker build -t front-blog:latest .
            # 重启服务
            cd ~/blog
            docker compose up -d front-blog
            docker image prune -f
